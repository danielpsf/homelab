name: homelab

networks:
  tunnel:
  monitoring:
  wazuh:

volumes:
  prometheus_data:
    external: true
    name: homelab_prometheus_data
  grafana_data:
    external: true
    name: homelab_grafana_data
  portainer_data:
  n8n_data:
  stirling_data:
  gotify_data:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_indexer_data:
  wazuh_dashboard_custom:

secrets:
  portainer_admin_password:
    file: ./secrets/portainer_admin_password

services:
  # ---------------------------------------------------------------------------
  # Cloudflare Tunnel — zero-trust ingress for all services
  # ---------------------------------------------------------------------------
  cloudflared:
    image: ${CLOUDFLARED_IMAGE}
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - tunnel
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Homepage — dashboard
  # ---------------------------------------------------------------------------
  homepage:
    image: ${HOMEPAGE_IMAGE}
    container_name: homepage
    restart: unless-stopped
    group_add:
      - ${DOCKER_GID}
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - HOMEPAGE_ALLOWED_HOSTS=${HOMEPAGE_ALLOWED_HOSTS}
      - HOMEPAGE_VAR_DOMAIN=${HOMEPAGE_VAR_DOMAIN}
      - HOMEPAGE_VAR_GRAFANA_PASSWORD=${HOMEPAGE_VAR_GRAFANA_PASSWORD}
      - HOMEPAGE_VAR_PORTAINER_KEY=${HOMEPAGE_VAR_PORTAINER_KEY}
      - HOMEPAGE_VAR_CF_ACCOUNT_ID=${HOMEPAGE_VAR_CF_ACCOUNT_ID}
      - HOMEPAGE_VAR_CF_TUNNEL_ID=${HOMEPAGE_VAR_CF_TUNNEL_ID}
      - HOMEPAGE_VAR_CF_API_TOKEN=${HOMEPAGE_VAR_CF_API_TOKEN}
      - HOMEPAGE_VAR_SONARR_URL=${HOMEPAGE_VAR_SONARR_URL}
      - HOMEPAGE_VAR_SONARR_KEY=${HOMEPAGE_VAR_SONARR_KEY}
      - HOMEPAGE_VAR_RADARR_URL=${HOMEPAGE_VAR_RADARR_URL}
      - HOMEPAGE_VAR_RADARR_KEY=${HOMEPAGE_VAR_RADARR_KEY}
      - HOMEPAGE_VAR_JELLYFIN_URL=${HOMEPAGE_VAR_JELLYFIN_URL}
      - HOMEPAGE_VAR_JELLYFIN_KEY=${HOMEPAGE_VAR_JELLYFIN_KEY}
      - HOMEPAGE_VAR_DELUGE_URL=${HOMEPAGE_VAR_DELUGE_URL}
      - HOMEPAGE_VAR_DELUGE_PASSWORD=${HOMEPAGE_VAR_DELUGE_PASSWORD}
      - HOMEPAGE_VAR_GOTIFY_KEY=${HOMEPAGE_VAR_GOTIFY_KEY}
    volumes:
      - ./files/homepage:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - tunnel
      - monitoring
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

  # ---------------------------------------------------------------------------
  # Portainer — container management
  # ---------------------------------------------------------------------------
  portainer:
    image: ${PORTAINER_IMAGE}
    container_name: portainer
    restart: unless-stopped
    command: --admin-password-file /run/secrets/portainer_admin_password
    secrets:
      - portainer_admin_password
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - tunnel
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # ---------------------------------------------------------------------------
  # Stirling PDF — PDF tools
  # ---------------------------------------------------------------------------
  stirling-pdf:
    image: ${STIRLING_PDF_IMAGE}
    container_name: stirling-pdf
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - DOCKER_ENABLE_SECURITY=true
      - SECURITY_ENABLELOGIN=true
      - SECURITY_INITIALLOGIN_USERNAME=${STIRLING_USERNAME}
      - SECURITY_INITIALLOGIN_PASSWORD=${STIRLING_PASSWORD}
    volumes:
      - stirling_data:/usr/share/tessdata
    networks:
      - tunnel
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE

  # ---------------------------------------------------------------------------
  # Gotify — push notification server
  # ---------------------------------------------------------------------------
  gotify:
    image: ${GOTIFY_IMAGE}
    container_name: gotify
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - GOTIFY_DEFAULTUSER_NAME=${GOTIFY_ADMIN_USER}
      - GOTIFY_DEFAULTUSER_PASS=${GOTIFY_ADMIN_PASSWORD}
      - GOTIFY_SERVER_PORT=80
      - GOTIFY_SERVER_STREAM_PINGPERIODSECONDS=45
      - GOTIFY_REGISTRATION=false
    volumes:
      - gotify_data:/app/data
    networks:
      - tunnel
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # n8n — workflow automation
  # ---------------------------------------------------------------------------
  n8n:
    image: ${N8N_IMAGE}
    container_name: n8n
    restart: unless-stopped
    environment:
      - TZ=${TZ}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=n8n.${DOMAIN}
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.${DOMAIN}/
      - N8N_METRICS=true
      - N8N_METRICS_INCLUDE_DEFAULT_METRICS=true
      - N8N_METRICS_INCLUDE_CACHE_METRICS=true
      - N8N_METRICS_INCLUDE_MESSAGE_EVENT_BUS_METRICS=true
      - N8N_METRICS_INCLUDE_WORKFLOW_ID_LABEL=true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - tunnel
      - monitoring
      - wazuh
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Grafana — visualization
  # ---------------------------------------------------------------------------
  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=${GRAFANA_PLUGINS}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./files/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - tunnel
      - monitoring
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Prometheus — metrics storage (internal only)
  # ---------------------------------------------------------------------------
  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./files/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Node Exporter — host metrics (internal only)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: ${NODE_EXPORTER_IMAGE}
    container_name: node-exporter
    restart: unless-stopped
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Blackbox Exporter — ping/HTTP probes (internal only)
  # ---------------------------------------------------------------------------
  blackbox-exporter:
    image: ${BLACKBOX_EXPORTER_IMAGE}
    container_name: blackbox-exporter
    restart: unless-stopped
    command:
      - --config.file=/config/blackbox.yml
    volumes:
      - ./files/prometheus/blackbox.yml:/config/blackbox.yml:ro
    networks:
      - monitoring
      - tunnel
      - wazuh
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    tmpfs:
      - /tmp

  # ---------------------------------------------------------------------------
  # Speedtest Exporter — internet speed metrics (internal only)
  # ---------------------------------------------------------------------------
  speedtest-exporter:
    image: ${SPEEDTEST_EXPORTER_IMAGE}
    container_name: speedtest-exporter
    restart: unless-stopped
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    read_only: true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
      - /home/speedtest/.config
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:9798/"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Wazuh Indexer — OpenSearch-based alert/event storage
  # ---------------------------------------------------------------------------
  wazuh-indexer:
    image: ${WAZUH_INDEXER_IMAGE}
    container_name: wazuh-indexer
    hostname: wazuh.indexer
    restart: unless-stopped
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms${WAZUH_INDEXER_HEAP} -Xmx${WAZUH_INDEXER_HEAP}
      - bootstrap.memory_lock=true
      - network.host=0.0.0.0
      - node.name=wazuh.indexer
      - cluster.initial_cluster_manager_nodes=wazuh.indexer
      - node.max_local_storage_nodes=1
      - plugins.security.allow_default_init_securityindex=true
      - NODES_DN=CN=wazuh.indexer,OU=Wazuh,O=Wazuh,L=California,C=US
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - ./files/wazuh/indexer/opensearch.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
      - ./files/wazuh/certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro
      - ./files/wazuh/certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/certs/indexer.pem:ro
      - ./files/wazuh/certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/certs/indexer-key.pem:ro
      - ./files/wazuh/certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem:ro
      - ./files/wazuh/certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem:ro
      - ./files/wazuh/indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml:ro
    networks:
      - wazuh
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -fks https://localhost:9200/_plugins/_security/health | grep -q 'status.*UP'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Wazuh Manager — SIEM analysis engine, receives agent data
  # ---------------------------------------------------------------------------
  wazuh-manager:
    image: ${WAZUH_MANAGER_IMAGE}
    container_name: wazuh-manager
    hostname: wazuh.manager
    restart: unless-stopped
    depends_on:
      wazuh-indexer:
        condition: service_healthy
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=${WAZUH_INDEXER_USERNAME}
      - INDEXER_PASSWORD=${WAZUH_INDEXER_PASSWORD}
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/filebeat/certs/root-ca.pem
      - SSL_CERTIFICATE=/etc/filebeat/certs/filebeat.pem
      - SSL_KEY=/etc/filebeat/certs/filebeat-key.pem
      - API_USERNAME=${WAZUH_API_USERNAME}
      - API_PASSWORD=${WAZUH_API_PASSWORD}
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - ./files/wazuh/ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - ./files/wazuh/integrations/custom-n8n:/wazuh-config-mount/integrations/custom-n8n:ro
      - ./files/wazuh/certs/root-ca.pem:/etc/filebeat/certs/root-ca.pem:ro
      - ./files/wazuh/certs/wazuh.manager.pem:/etc/filebeat/certs/filebeat.pem:ro
      - ./files/wazuh/certs/wazuh.manager-key.pem:/etc/filebeat/certs/filebeat-key.pem:ro
      - ./files/wazuh/certs/root-ca.pem:/var/ossec/etc/certs/root-ca.pem:ro
      - ./files/wazuh/certs/wazuh.manager.pem:/var/ossec/etc/certs/manager.pem:ro
      - ./files/wazuh/certs/wazuh.manager-key.pem:/var/ossec/etc/certs/manager-key.pem:ro
    networks:
      - wazuh
    ports:
      - "1514:1514"
      - "1515:1515"
      - "55000:55000"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    healthcheck:
      test: ["CMD-SHELL", "curl -ku ${WAZUH_API_USERNAME}:${WAZUH_API_PASSWORD} -s -f -X POST https://localhost:55000/security/user/authenticate?raw=true -o /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ---------------------------------------------------------------------------
  # Wazuh Dashboard — web UI for security monitoring
  # ---------------------------------------------------------------------------
  wazuh-dashboard:
    image: ${WAZUH_DASHBOARD_IMAGE}
    container_name: wazuh-dashboard
    hostname: wazuh.dashboard
    restart: unless-stopped
    depends_on:
      wazuh-indexer:
        condition: service_healthy
      wazuh-manager:
        condition: service_healthy
    environment:
      - OPENSEARCH_HOSTS=https://wazuh.indexer:9200
      - WAZUH_API_URL=https://wazuh.manager
      - API_USERNAME=${WAZUH_API_USERNAME}
      - API_PASSWORD=${WAZUH_API_PASSWORD}
      - DASHBOARD_USERNAME=${WAZUH_INDEXER_USERNAME}
      - DASHBOARD_PASSWORD=${WAZUH_INDEXER_PASSWORD}
    entrypoint: ["/custom-entrypoint.sh"]
    volumes:
      - ./files/wazuh/dashboard/entrypoint.sh:/custom-entrypoint.sh:ro
      - wazuh_dashboard_custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
      - ./files/wazuh/certs/wazuh.dashboard.pem:/etc/wazuh-dashboard/certs/dashboard.pem:ro
      - ./files/wazuh/certs/wazuh.dashboard-key.pem:/etc/wazuh-dashboard/certs/dashboard-key.pem:ro
      - ./files/wazuh/certs/root-ca.pem:/etc/wazuh-dashboard/certs/root-ca.pem:ro
    networks:
      - tunnel
      - wazuh
