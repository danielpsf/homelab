global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'n8n'
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ['n8n:5678']

  - job_name: 'speedtest'
    metrics_path: /metrics
    scrape_interval: 30m
    scrape_timeout: 60s
    static_configs:
      - targets: ['speedtest-exporter:9798']

  # Service health probes — used by homelab overview dashboard
  - job_name: 'service-health'
    metrics_path: /probe
    scrape_interval: 30s
    params:
      module: [http_any]
    static_configs:
      - targets:
          - http://homepage:3000
          - http://grafana:3000
          - http://stirling-pdf:8080
          - http://n8n:5678
          - http://portainer:9000
        labels:
          probe_group: homelab
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      - source_labels: [__param_target]
        regex: 'http://([^:]+):.*'
        target_label: service
        replacement: $1

  # Wazuh dashboard probe (self-signed TLS — separate module)
  - job_name: 'service-health-tls'
    metrics_path: /probe
    scrape_interval: 30s
    params:
      module: [http_any_tls_skip]
    static_configs:
      - targets:
          - https://wazuh-dashboard:443
        labels:
          probe_group: homelab
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
      - source_labels: [__param_target]
        regex: 'https?://([^:]+):.*'
        target_label: service
        replacement: $1

  # External connectivity probes
  - job_name: 'ping'
    metrics_path: /probe
    scrape_interval: 5m
    params:
      module: [http_2xx]
    file_sd_configs:
      - files:
        - pinghosts.yaml
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*);(.*)'
        target_label: instance
        replacement: $1
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*);(.*)'
        target_label: humanname
        replacement: $2
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*);(.*)'
        target_label: routing
        replacement: $3
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*);(.*)'
        target_label: switching
        replacement: $4
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*);(.*)'
        target_label: __param_module
        replacement: $5
      - source_labels: [instance]
        target_label: __param_target
      - target_label: __address__
        replacement: blackbox-exporter:9115
