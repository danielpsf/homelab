global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    scrape_interval: 15s
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'speedtest'
    metrics_path: /metrics
    scrape_interval: 30m
    scrape_timeout: 60s
    static_configs:
      - targets: ['speedtest-exporter:9798']

  - job_name: 'ping'
    metrics_path: /probe
    scrape_interval: 5m
    params:
      module: [http_2xx]
    file_sd_configs:
      - files:
        - pinghosts.yaml
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*);(.*)'
        target_label: instance
        replacement: $1
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*);(.*)'
        target_label: humanname
        replacement: $2
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*);(.*)'
        target_label: routing
        replacement: $3
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*);(.*)'
        target_label: switching
        replacement: $4
      - source_labels: [__address__]
        regex: '(.*);(.*);(.*);(.*);(.*)'
        target_label: __param_module
        replacement: $5
      - source_labels: [instance]
        target_label: __param_target
      - target_label: __address__
        replacement: blackbox-exporter:9115
