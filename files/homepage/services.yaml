---
- Applications:
    - Grafana:
        icon: grafana
        href: "https://grafana.{{HOMEPAGE_VAR_DOMAIN}}"
        description: Metrics visualization and dashboards
        server: local
        container: grafana
        widget:
          type: grafana
          url: "http://grafana:3000"
          username: admin
          password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"
    - n8n:
        icon: n8n
        href: "https://n8n.{{HOMEPAGE_VAR_DOMAIN}}"
        description: Workflow automation platform
        server: local
        container: n8n
    - Portainer:
        icon: portainer
        href: "https://portainer.{{HOMEPAGE_VAR_DOMAIN}}"
        description: Container management
        server: local
        container: portainer
        widget:
          type: portainer
          url: "http://portainer:9000"
          env: 1
          key: "{{HOMEPAGE_VAR_PORTAINER_KEY}}"
    - Wazuh:
        icon: wazuh
        href: "https://wazuh.{{HOMEPAGE_VAR_DOMAIN}}"
        description: Security monitoring (SIEM/XDR)
        server: local
        container: wazuh-dashboard
- Monitoring:
    - Prometheus:
        icon: prometheus
        href: "http://prometheus:9090"
        description: Metrics storage and alerting
        server: local
        container: prometheus
        widget:
          type: prometheus
          url: "http://prometheus:9090"
- Media:
    - Sonarr:
        icon: sonarr
        href: "{{HOMEPAGE_VAR_SONARR_URL}}"
        description: TV show management
        widget:
          type: sonarr
          url: "{{HOMEPAGE_VAR_SONARR_URL}}"
          key: "{{HOMEPAGE_VAR_SONARR_KEY}}"
    - Radarr:
        icon: radarr
        href: "{{HOMEPAGE_VAR_RADARR_URL}}"
        description: Movie management
        widget:
          type: radarr
          url: "{{HOMEPAGE_VAR_RADARR_URL}}"
          key: "{{HOMEPAGE_VAR_RADARR_KEY}}"
    - Jellyfin:
        icon: jellyfin
        href: "{{HOMEPAGE_VAR_JELLYFIN_URL}}"
        description: Media streaming
        widget:
          type: jellyfin
          url: "{{HOMEPAGE_VAR_JELLYFIN_URL}}"
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
    - Deluge:
        icon: deluge
        href: "{{HOMEPAGE_VAR_DELUGE_URL}}"
        description: Torrent client
        widget:
          type: deluge
          url: "{{HOMEPAGE_VAR_DELUGE_URL}}"
          password: "{{HOMEPAGE_VAR_DELUGE_PASSWORD}}"
- Tools:
    - Stirling PDF:
        icon: stirling-pdf
        href: "https://pdf.{{HOMEPAGE_VAR_DOMAIN}}"
        description: PDF manipulation tools
        server: local
        container: stirling-pdf
    - Cloudflared:
        icon: cloudflare
        description: Cloudflare Tunnel ingress
        server: local
        container: cloudflared
        widget:
          type: cloudflared
          accountid: "{{HOMEPAGE_VAR_CF_ACCOUNT_ID}}"
          tunnelid: "{{HOMEPAGE_VAR_CF_TUNNEL_ID}}"
          key: "{{HOMEPAGE_VAR_CF_API_TOKEN}}"
